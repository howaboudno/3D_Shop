services:
  db:
    image: postgres:17
    container_name: 3dshop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: 3dshop
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: 3dshop_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 3dshop"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  pgdata:
